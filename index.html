<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>레터스 견적서</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root {
  --bg: #0a0a0f;
  --surface: #141420;
  --surface2: #1c1c2e;
  --border: #2a2a40;
  --primary: #6366f1;
  --primary-glow: rgba(99,102,241,0.3);
  --accent: #22d3ee;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-bright: #f8fafc;
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 15px; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
}
.header .logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff;
}
.header h1 { font-size: 17px; font-weight: 600; }
.header .step-badge {
  margin-left: auto;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  color: var(--text-dim);
}

/* Screens */
.screen { display: none; padding: 20px; padding-bottom: 100px; }
.screen.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* Upload Zone */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 48px 24px;
  text-align: center;
  transition: all 0.3s;
  background: var(--surface);
  margin-bottom: 24px;
}
.upload-zone.dragover {
  border-color: var(--primary);
  background: rgba(99,102,241,0.08);
  box-shadow: 0 0 40px var(--primary-glow);
}
.upload-zone .icon { font-size: 48px; margin-bottom: 16px; }
.upload-zone p { color: var(--text-dim); margin-bottom: 16px; font-size: 14px; }
.upload-btn {
  display: inline-block;
  background: var(--primary);
  color: #fff;
  padding: 12px 28px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}
.upload-btn:active { transform: scale(0.96); }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

/* Items Table */
.items-table { width: 100%; font-size: 13px; }
.items-table th {
  text-align: left; padding: 8px 6px;
  color: var(--text-dim); font-weight: 500;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.items-table td {
  padding: 8px 6px;
  border-bottom: 1px solid rgba(42,42,64,0.5);
}
.items-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.cat-header {
  background: var(--surface2);
  font-weight: 600;
  color: var(--accent);
}
.cat-header td { padding: 10px 6px !important; }
.subtotal-row { font-weight: 600; color: var(--text-bright); }
.subtotal-row td { border-bottom: 2px solid var(--border) !important; }
.free-service { color: var(--text-dim); font-style: italic; }

/* Form */
.form-group { margin-bottom: 18px; }
.form-label {
  display: block; font-size: 13px;
  color: var(--text-dim); margin-bottom: 6px;
  font-weight: 500;
}
.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--primary); }
.form-input::placeholder { color: var(--text-dim); }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }

/* Buttons */
.btn {
  width: 100%; padding: 16px;
  border-radius: 14px; border: none;
  font-family: inherit; font-size: 16px;
  font-weight: 600; cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-group { display: flex; gap: 10px; margin-top: 20px; }
.btn-group .btn { flex: 1; }

/* Result Stats */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.stat-box {
  background: var(--surface2);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.stat-box .label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.stat-box .value { font-size: 20px; font-weight: 700; }
.stat-box .value.accent { color: var(--accent); }
.stat-box .value.success { color: var(--success); }
.stat-box .value.warning { color: var(--warning); }

/* Progress */
.progress-bar {
  background: var(--surface2);
  border-radius: 8px;
  height: 6px;
  overflow: hidden;
  margin: 16px 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 8px;
  transition: width 0.5s ease;
}

/* Toast */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Loading overlay */
.loading-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,10,15,0.9);
  z-index: 300;
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text-dim); }

/* Margin note */
.margin-note {
  background: rgba(245,158,11,0.1);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  color: var(--warning);
  margin-bottom: 16px;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">L</div>
  <h1>레터스 견적서</h1>
  <span class="step-badge" id="stepBadge">1/3</span>
</div>

<!-- Screen 1: Upload -->
<div class="screen active" id="screen1">
  <div class="upload-zone" id="dropZone">
    <div class="icon">📄</div>
    <p>협력사 견적서 엑셀 파일을<br>업로드하세요</p>
    <button class="upload-btn" id="uploadBtn" type="button">파일 선택</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.xlsm" style="display:none;">
  </div>
  
  <div class="card">
    <div class="card-title">사용 방법</div>
    <p style="font-size:13px; color:var(--text-dim); line-height:1.8;">
      1. 협력사 견적서 엑셀 파일 업로드<br>
      2. 마진율, 고객 정보 입력<br>
      3. 자동 견적서 생성 → PDF 다운로드 / 이메일 발송
    </p>
  </div>
</div>

<!-- Screen 2: Review & Settings -->
<div class="screen" id="screen2">
  <div class="card">
    <div class="card-title">📋 협력사 견적 내역</div>
    <div style="overflow-x:auto;">
      <table class="items-table" id="itemsTable">
        <thead><tr><th>품목</th><th>수량</th><th class="num">단가</th><th class="num">합계</th></tr></thead>
        <tbody id="itemsBody"></tbody>
      </table>
    </div>
    <div id="coopTotalDisplay" style="text-align:right; margin-top:12px; font-size:15px; font-weight:600;"></div>
  </div>

  <div class="card">
    <div class="card-title">⚙️ 설정</div>
    <div class="form-group">
      <label class="form-label">공헌이익률 (%)</label>
      <input class="form-input" type="number" id="marginInput" value="8" min="1" max="50" placeholder="8">
    </div>
    <div class="form-group">
      <label class="form-label">고객사명</label>
      <input class="form-input" type="text" id="customerName" placeholder="예: 이마고픽쳐스">
    </div>
    <div class="form-group">
      <label class="form-label">고객 이메일</label>
      <input class="form-input" type="email" id="customerEmail" placeholder="example@company.com">
    </div>
  </div>
  
  <div class="btn-group">
    <button class="btn btn-outline" onclick="goScreen(1)">← 뒤로</button>
    <button class="btn btn-primary" onclick="generateQuote()">견적서 생성 →</button>
  </div>
</div>

<!-- Screen 3: Result -->
<div class="screen" id="screen3">
  <div class="stat-grid">
    <div class="stat-box">
      <div class="label">고객 제출가</div>
      <div class="value accent" id="resultCustomerPrice">-</div>
    </div>
    <div class="stat-box">
      <div class="label">협력사 원가</div>
      <div class="value" id="resultCoopPrice">-</div>
    </div>
    <div class="stat-box">
      <div class="label">공헌이익</div>
      <div class="value success" id="resultProfit">-</div>
    </div>
    <div class="stat-box">
      <div class="label">공헌이익률</div>
      <div class="value warning" id="resultMargin">-</div>
    </div>
  </div>
  
  <div class="margin-note" id="marginNote" style="display:none;"></div>

  <div class="card">
    <div class="card-title">📋 레터스 견적 내역</div>
    <div style="overflow-x:auto;">
      <table class="items-table" id="resultTable">
        <thead><tr><th>품목</th><th>수량</th><th class="num">단가</th><th class="num">합계</th></tr></thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </div>

  <button class="btn btn-primary" onclick="downloadPDF()" style="margin-bottom:10px;">
    📥 PDF 다운로드
  </button>
  <button class="btn btn-success" onclick="sendEmailWithPDF()" style="margin-bottom:10px;">
    ✉️ PDF 첨부 이메일 발송
  </button>
  <button class="btn btn-outline" onclick="goScreen(2)">
    ← 수정하기
  </button>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">처리 중...</div>
</div>

<div class="toast" id="toast"></div>

// ============================================================
// Screen Navigation
// ============================================================
function goScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + n).classList.add('active');
  document.getElementById('stepBadge').textContent = n + '/3';
  window.scrollTo(0, 0);
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.innerHTML = msg.replace(/\n/g, '<br>');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 2500);
}
function fmt(n) { return n ? n.toLocaleString('ko-KR') : '0'; }
function truncPrice(price, unit) {
  if (unit <= 0) unit = 1000;
  return Math.floor(Math.floor(price / unit) * unit);
}

// ============================================================
// File Upload
// ============================================================
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');

uploadBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  fileInput.click();
});
dropZone.addEventListener('click', (e) => {
  if (e.target === uploadBtn) return;
  fileInput.click();
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

async function handleFile(file) {
  showLoading('엑셀 파일 읽는 중...');
  try {
    // FileReader 방식 (iOS 호환)
    const data = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(new Uint8Array(e.target.result));
      reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다.'));
      reader.readAsArrayBuffer(file);
    });
    
    showLoading('엑셀 파일 분석 중...');
    const wb = XLSX.read(data, { type: 'array' });
    
    const coopSheet = wb.Sheets['협력사'];
    if (!coopSheet) {
      const names = wb.SheetNames.join(', ');
      throw new Error('협력사 시트를 찾을 수 없습니다. (시트: ' + names + ')');
    }
    
    parseCoopSheet(coopSheet);
    
    // Parse 레터스 sheet for addresses
    const letusSheet = wb.Sheets['레터스'];
    if (letusSheet) {
      parseLetusInfo(letusSheet);
    }
    
    showLoading('Google Sheets 단가표 로딩 중...');
    await loadPriceDB();
    
    renderItemsTable();
    hideLoading();
    goScreen(2);
    showToast('✅ 파일 분석 완료');
  } catch(e) {
    hideLoading();
    alert('오류: ' + e.message);
  }
}

// ============================================================
// Parse Cooperator Sheet
// ============================================================
function parseCoopSheet(ws) {
  const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  
  // Find 소계 rows
  const subtotalRows = [];
  for (let r = 13; r < 60; r++) {
    const row = json[r] || [];
    if (String(row[7] || '').trim() === '소계') {
      subtotalRows.push(r);
      if (subtotalRows.length >= 4) break;
    }
  }
  
  if (subtotalRows.length < 4) throw new Error('소계 행을 찾을 수 없습니다 (' + subtotalRows.length + '개)');
  
  const ranges = [
    [13, subtotalRows[0] - 1],  // 자재비
    [subtotalRows[0] + 1, subtotalRows[1] - 1],  // 차량비
    [subtotalRows[1] + 1, subtotalRows[2] - 1],  // 인건비
    [subtotalRows[2] + 1, subtotalRows[3] - 1],  // 옵션
  ];
  
  const categories = ['자재비', '차량비', '인건비', '옵션'];
  const results = [[], [], [], []];
  
  for (let c = 0; c < 4; c++) {
    for (let r = ranges[c][0]; r <= ranges[c][1]; r++) {
      const row = json[r] || [];
      const name = String(row[5] || '').trim();
      const qty = Number(row[6]) || 0;
      const price = Number(row[7]) || 0;
      const days = Number(row[8]) || 1;
      const total = row[9];
      const remark = String(row[10] || '').trim();
      
      if (qty > 0 && name) {
        const isFree = price > 0 && (total === '' || total === null || total === undefined || Number(total) === 0);
        results[c].push({ name, qty, unitPrice: price, days: days || 1, remark, isFreeService: isFree, category: categories[c] });
      }
    }
  }
  
  coopData.mat = results[0];
  coopData.veh = results[1];
  coopData.lab = results[2];
  coopData.opt = results[3];
  
  // Find 총합계
  for (let r = 55; r < 70; r++) {
    const row = json[r] || [];
    const text = String(row[6] || '') + String(row[5] || '') + String(row[7] || '');
    if (text.includes('총') && text.includes('계')) {
      const val = Number(row[9]) || 0;
      if (val > 0) { coopData.coopTotal = val; break; }
    }
  }
  
  // Work date & quote date (Row 10: C5=견적일자, C10=작업일 - Excel serial dates)
  if (json[9]) {
    coopData.workDate = json[9][9] || '';
    coopData.quoteDate = json[9][4] || '';
  }
}

// ============================================================
// Parse 레터스 sheet for addresses
// ============================================================
function parseLetusInfo(ws) {
  const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  
  // 동적으로 출발지/도착지 행 찾기
  for (let r = 55; r < json.length; r++) {
    const row = json[r] || [];
    const label = String(row[2] || '').trim();
    if (label === '출발지') {
      coopData.departure = String(row[4] || '').trim();
      coopData.customerContact = String(row[10] || '').trim();
    }
    if (label === '도착지') {
      coopData.arrival = String(row[4] || '').trim();
    }
  }
}

// ============================================================
// Google Sheets Price DB

async function loadPriceDB() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent('단가표')}`;
  let resp;
  try {
    resp = await fetch(url);
  } catch(e) {
    throw new Error('단가표 서버 연결 실패. 인터넷 연결을 확인해주세요.');
  }
  if (!resp.ok) throw new Error('단가표 로딩 실패 (HTTP ' + resp.status + ')');
  const csv = await resp.text();
  if (!csv || csv.length < 10) throw new Error('단가표가 비어있습니다. Google Sheets 공유 설정을 확인하세요.');
  
  priceDB = [];
  const lines = csv.split('\n');
  let currentCategory = '';
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    if (cols.length < 6) continue;
    
    // Category carry-forward (VBA pattern)
    if (cols[0] && cols[0].trim()) currentCategory = cols[0].trim();
    
    // cols[2]=품목명, cols[3]=DB가, cols[5]=고정/조정, cols[6]=조정범위
    const itemName = (cols[2] || '').trim();
    const priceTypeStr = (cols[5] || '').trim();
    if (!itemName || !priceTypeStr) continue;
    
    // Parse adjustment range (e.g. "0~3000")
    let adjMin = 0, adjMax = 0;
    if (cols.length > 6 && cols[6]) {
      const rangeParts = cols[6].split('~');
      if (rangeParts.length >= 2) {
        adjMin = Number(rangeParts[0]) || 0;
        adjMax = Number(rangeParts[1]) || 0;
      }
    }
    
    priceDB.push({
      category: currentCategory,
      itemName: itemName,
      priceType: priceTypeStr === '고정' ? 1 : 2,
      dbPrice: Number(String(cols[3]).replace(/,/g, '')) || 0,
      adjMin: adjMin,
      adjMax: adjMax,
      truncUnit: currentCategory === '자재비' ? 1000 : 10000,
    });
  }
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
    else { current += ch; }
  }
  result.push(current.trim());
  return result;
}

// ============================================================
// Generate Quote (main pricing logic)
// ============================================================
async function generateQuote() {
  const marginRate = Number(document.getElementById('marginInput').value);
  const customerName = document.getElementById('customerName').value.trim();
  const customerEmail = document.getElementById('customerEmail').value.trim();
  
  if (!marginRate || marginRate < 1 || marginRate > 50) { alert('마진율을 1~50% 사이로 입력하세요.'); return; }
  if (!customerName) { alert('고객사명을 입력하세요.'); return; }
  if (!customerEmail) { alert('이메일을 입력하세요.'); return; }
  
  showLoading('견적서 생성 중...');
  await new Promise(r => setTimeout(r, 100));
  
  try {
    const targetMargin = marginRate / 100;
    const coopTotal = coopData.coopTotal;
    
    // Apply prices at given ratio
    function applyPricesAtRatio(ratio) {
      const allItems = [];
      const cats = [
        { items: coopData.mat, cat: '자재비', truncUnit: 1000 },
        { items: coopData.veh, cat: '차량비', truncUnit: 10000 },
        { items: coopData.lab, cat: '인건비', truncUnit: 10000 },
        { items: coopData.opt, cat: '옵션', truncUnit: 10000 },
      ];
      
      for (const c of cats) {
        for (const item of c.items) {
          if (item.isFreeService) {
            allItems.push({ ...item, letusPrice: item.unitPrice, letusTotal: 0, category: c.cat });
            continue;
          }
          
          const coopPrice = item.unitPrice;
          let letusPrice = 0;
          
          if (coopPrice <= 0) {
            // DB match for zero-price items
            const match = priceDB.find(r => r.category === c.cat && 
              (item.name.includes(r.itemName) || r.itemName.includes(item.name)));
            letusPrice = match ? match.dbPrice : 0;
          } else {
            // Find max price
            let maxPrice = 0;
            const match = priceDB.find(r => r.category === c.cat && 
              (item.name.includes(r.itemName) || r.itemName.includes(item.name)));
            
            if (match) {
              if (match.priceType === 1) {
                maxPrice = Math.max(match.dbPrice, coopPrice);
              } else {
                maxPrice = truncPrice(coopPrice + match.adjMax, match.truncUnit);
              }
            } else {
              maxPrice = truncPrice(coopPrice + (c.truncUnit === 1000 ? 3000 : 30000), c.truncUnit);
            }
            
            letusPrice = truncPrice(coopPrice + (maxPrice - coopPrice) * ratio, c.truncUnit);
            if (letusPrice < coopPrice) letusPrice = coopPrice;
          }
          
          allItems.push({
            ...item,
            letusPrice,
            letusTotal: letusPrice * item.qty * item.days,
            category: c.cat,
          });
        }
      }
      return allItems;
    }
    
    // Calculate final price from items (with overhead)
    function calcFinalPrice(items, overrides = {}) {
      const matTotal = items.filter(i => i.category === '자재비' && !i.isFreeService).reduce((s, i) => s + i.letusTotal, 0);
      const vehTotal = items.filter(i => i.category === '차량비' && !i.isFreeService).reduce((s, i) => s + i.letusTotal, 0);
      const labTotal = items.filter(i => i.category === '인건비' && !i.isFreeService).reduce((s, i) => s + i.letusTotal, 0);
      const optTotal = items.filter(i => i.category === '옵션' && !i.isFreeService).reduce((s, i) => s + i.letusTotal, 0);
      
      const direct = matTotal + vehTotal + labTotal + optTotal;
      
      const gonguPct = overrides.gongu ?? 5;
      const gonggwaPct = overrides.gonggwa ?? 5;
      const unyoungPct = overrides.unyoung ?? 5;
      const iikPct = overrides.iik ?? 10;
      
      const gongu = gonguPct > 0 ? (matTotal + labTotal) * gonguPct / 100 : 0;
      const gonggwa = (direct + gongu) * gonggwaPct / 100;
      const unyoung = (direct + gongu + gonggwa) * unyoungPct / 100;
      const subtotal = direct + gongu + gonggwa + unyoung;
      const iik = subtotal * iikPct / 100;
      const total = subtotal + iik;
      const finalPrice = Math.floor(total / 10000) * 10000;
      
      return {
        matTotal, vehTotal, labTotal, optTotal, direct,
        gongu, gonggwa, unyoung, iik, finalPrice,
        gonguPct, gonggwaPct, unyoungPct, iikPct,
      };
    }
    
    function calcMargin(items, overrides) {
      const { finalPrice } = calcFinalPrice(items, overrides);
      return finalPrice > 0 ? (finalPrice - coopTotal) / finalPrice : 0;
    }
    
    // Binary search for best ratio
    let bestRatio = 0;
    let bestMarginDiff = 1;
    let marginNote = '';
    
    const marginAtZero = calcMargin(applyPricesAtRatio(0));
    const marginAtOne = calcMargin(applyPricesAtRatio(1));
    
    if (marginAtZero >= targetMargin) {
      bestRatio = 0;
      marginNote = '최소 단가에서도 목표 초과';
    } else if (marginAtOne <= targetMargin) {
      bestRatio = 1;
      marginNote = '최대 단가에서도 목표 미달';
    } else {
      let lo = 0, hi = 1;
      for (let iter = 0; iter < 40; iter++) {
        const mid = (lo + hi) / 2;
        const m = calcMargin(applyPricesAtRatio(mid));
        if (m >= targetMargin && (m - targetMargin) < bestMarginDiff) {
          bestMarginDiff = m - targetMargin;
          bestRatio = mid;
        }
        if (m < targetMargin) lo = mid; else hi = mid;
        if (Math.abs(m - targetMargin) < 0.001) break;
      }
    }
    
    // Apply best ratio
    let finalItems = applyPricesAtRatio(bestRatio);
    let overrides = {};
    let curMargin = calcMargin(finalItems, overrides);
    
    // Step 9-1: Revert individual items to coop price
    if (curMargin > targetMargin + 0.005) {
      const impacts = finalItems
        .map((item, idx) => ({
          idx,
          impact: (item.letusPrice - item.unitPrice) * item.qty * item.days,
          coopPrice: item.unitPrice,
        }))
        .filter(x => x.impact > 0 && x.coopPrice > 0)
        .sort((a, b) => b.impact - a.impact);
      
      for (const { idx, coopPrice } of impacts) {
        const saved = finalItems[idx].letusPrice;
        finalItems[idx].letusPrice = coopPrice;
        finalItems[idx].letusTotal = coopPrice * finalItems[idx].qty * finalItems[idx].days;
        
        const newMargin = calcMargin(finalItems, overrides);
        if (newMargin < targetMargin) {
          finalItems[idx].letusPrice = saved;
          finalItems[idx].letusTotal = saved * finalItems[idx].qty * finalItems[idx].days;
        }
      }
      curMargin = calcMargin(finalItems, overrides);
      marginNote = '개별 항목 최적화 적용';
    }
    
    // Step 9-2: Indirect cost adjustment
    if (curMargin > targetMargin + 0.005) {
      // 1. 공구손료 → 0%
      if (curMargin > targetMargin + 0.005) {
        overrides.gongu = 0;
        curMargin = calcMargin(finalItems, overrides);
      }
      // 2. 공과잡비 5% → 3%
      if (curMargin > targetMargin + 0.005) {
        overrides.gonggwa = 3;
        curMargin = calcMargin(finalItems, overrides);
      }
      // 3. 운영비 5% → 3%
      if (curMargin > targetMargin + 0.005) {
        overrides.unyoung = 3;
        curMargin = calcMargin(finalItems, overrides);
      }
      // 4. 기업이윤 10% → 5% (step by step)
      if (curMargin > targetMargin + 0.005) {
        for (let pct = 9; pct >= 5; pct--) {
          overrides.iik = pct;
          curMargin = calcMargin(finalItems, overrides);
          if (curMargin <= targetMargin + 0.005) break;
        }
      }
      
      curMargin = calcMargin(finalItems, overrides);
      if (curMargin > targetMargin + 0.005) {
        marginNote = `간접비 조정 후에도 최소 ${(curMargin*100).toFixed(1)}%`;
      } else {
        marginNote = '간접비 비율 조정 적용';
      }
    }
    
    // Final calculation
    const finalCalc = calcFinalPrice(finalItems, overrides);
    const profit = finalCalc.finalPrice - coopTotal;
    const actualMargin = finalCalc.finalPrice > 0 ? (profit / finalCalc.finalPrice) * 100 : 0;
    
    // Store result
    letusResult = {
      items: finalItems,
      calc: finalCalc,
      finalPrice: finalCalc.finalPrice,
      coopTotal,
      profit,
      margin: actualMargin,
      marginNote,
      overrides,
      customerName,
      customerEmail,
    };
    
    renderResult();
    hideLoading();
    goScreen(3);
    showToast('✅ 견적서 생성 완료');
  } catch(e) {
    hideLoading();
    alert('오류: ' + e.message);
    console.error(e);
  }
}

// Render Result
// ============================================================
function renderResult() {
  const r = letusResult;
  document.getElementById('resultCustomerPrice').textContent = fmt(r.finalPrice) + '원';
  document.getElementById('resultCoopPrice').textContent = fmt(Math.round(r.coopTotal)) + '원';
  document.getElementById('resultProfit').textContent = fmt(Math.round(r.profit)) + '원';
  document.getElementById('resultMargin').textContent = r.margin.toFixed(1) + '%';
  
  if (r.marginNote) {
    document.getElementById('marginNote').style.display = 'block';
    document.getElementById('marginNote').textContent = '💡 ' + r.marginNote;
  } else {
    document.getElementById('marginNote').style.display = 'none';
  }
  
  const body = document.getElementById('resultBody');
  body.innerHTML = '';
  
  const catNames = ['자재비', '차량비', '인건비', '옵션'];
  for (const catName of catNames) {
    const items = r.items.filter(i => i.category === catName);
    if (items.length === 0) continue;
    
    body.innerHTML += `<tr class="cat-header"><td colspan="4">${catName}</td></tr>`;
    let subtotal = 0;
    for (const item of items) {
      const total = item.isFreeService ? '-' : fmt(item.letusTotal);
      if (!item.isFreeService) subtotal += item.letusTotal;
      body.innerHTML += `<tr${item.isFreeService?' class="free-service"':''}>
        <td>${item.name}</td>
        <td>${item.qty}</td>
        <td class="num">${fmt(item.letusPrice)}</td>
        <td class="num">${total}</td>
      </tr>`;
    }
    body.innerHTML += `<tr class="subtotal-row"><td colspan="3">소계</td><td class="num">${fmt(subtotal)}</td></tr>`;
  }
  
  // Indirect costs
  const c = r.calc;
  const indirects = [];
  if (c.gonguPct > 0) indirects.push(['공구손료 ' + c.gonguPct + '%', c.gongu]);
  indirects.push(['공과잡비 ' + c.gonggwaPct + '%', c.gonggwa]);
  indirects.push(['운영비 ' + c.unyoungPct + '%', c.unyoung]);
  indirects.push(['기업이윤 ' + c.iikPct + '%', c.iik]);
  
  for (const [label, val] of indirects) {
    body.innerHTML += `<tr><td colspan="3" style="color:var(--text-dim)">${label}</td><td class="num" style="color:var(--text-dim)">${fmt(Math.round(val))}</td></tr>`;
  }
  body.innerHTML += `<tr class="subtotal-row" style="font-size:15px"><td colspan="3">총합계 (부가세별도)</td><td class="num" style="color:var(--accent)">${fmt(r.finalPrice)}</td></tr>`;
}

function excelDateToStr(serial) {
  if (!serial || serial < 1000) return '';
  const d = new Date((serial - 25569) * 86400000);
  return `${d.getFullYear()}년 ${String(d.getMonth()+1).padStart(2,'0')}월 ${String(d.getDate()).padStart(2,'0')}일`;
}

async function downloadPDF() {
  showLoading('PDF 생성 중...');
  await new Promise(r => setTimeout(r, 100));
  
  try {
    const pdfBlob = await generatePDFBlob();
    const fileName = getPDFFileName();
    
    const link = document.createElement('a');
    link.href = URL.createObjectURL(pdfBlob);
    link.download = fileName;
    link.click();
    URL.revokeObjectURL(link.href);
    
    hideLoading();
    showToast('📥 PDF 다운로드 완료');
  } catch(e) {
    hideLoading();
    alert('PDF 생성 오류: ' + e.message);
    console.error(e);
  }
}

// Generate PDF as blob (shared by download and email)
async function generatePDFBlob() {
  const r = letusResult;
  const today = new Date();
  const todayStr = `${today.getFullYear()}년 ${String(today.getMonth()+1).padStart(2,'0')}월 ${String(today.getDate()).padStart(2,'0')}일`;
  const quoteDateStr = excelDateToStr(Number(coopData.quoteDate)) || todayStr;
  const workDateStr = excelDateToStr(Number(coopData.workDate)) || '';
  
  // Build items HTML (same as downloadPDF)
  const catOrder = [
    { key: '인건비', num: 1 },
    { key: '자재비', num: 2 },
    { key: '차량비', num: 3 },
    { key: '옵션', num: 4 },
  ];
  
  let itemsHtml = '';
  for (const cat of catOrder) {
    const items = r.items.filter(i => i.category === cat.key);
    if (items.length === 0) continue;
    let subtotal = 0;
    let first = true;
    for (const item of items) {
      const total = item.isFreeService ? '-' : fmt(item.letusTotal);
      if (!item.isFreeService) subtotal += item.letusTotal;
      const unit = cat.key === '차량비' ? '대' : (cat.key === '인건비' ? '명' : (cat.key === '자재비' ? '개' : '식'));
      itemsHtml += `<tr>
        <td class="c">${first ? cat.num : ''}</td>
        <td class="l">${first ? cat.key : ''}</td>
        <td class="l">${item.name}</td>
        <td class="r">${item.qty}</td>
        <td class="c">${unit}</td>
        <td class="r">${fmt(item.letusPrice)}</td>
        <td class="r">${total}</td>
        <td class="l rem">${item.remark || ''}</td>
      </tr>`;
      first = false;
    }
    itemsHtml += `<tr class="sub"><td></td><td></td><td></td><td></td><td></td><td class="r">소계</td><td class="r">${fmt(subtotal)}</td><td></td></tr>`;
  }
  
  const c = r.calc;
  const indirects = [];
  if (c.gonguPct > 0) indirects.push(['공구손료', c.gonguPct, c.gongu]);
  indirects.push(['공과잡비', c.gonggwaPct, c.gonggwa]);
  indirects.push(['운영비 (안전관리, 보험료)', c.unyoungPct, c.unyoung]);
  indirects.push(['기업이윤', c.iikPct, c.iik]);
  for (const ind of indirects) {
    itemsHtml += `<tr class="ind"><td></td><td></td><td class="l">${ind[0]}</td><td></td><td></td><td></td><td class="r">${fmt(Math.round(ind[2]))}</td><td></td></tr>`;
  }
  
  const totalBeforeRound = r.items.filter(i=>!i.isFreeService).reduce((s,i)=>s+i.letusTotal,0) 
    + (c.gonguPct > 0 ? c.gongu : 0) + c.gonggwa + c.unyoung + c.iik;
  itemsHtml += `<tr class="total-row"><td colspan="6" class="r" style="font-weight:700;">합 계</td><td class="r" style="font-weight:700;">₩${fmt(Math.round(totalBeforeRound))}</td><td></td></tr>`;
  itemsHtml += `<tr class="final-row"><td colspan="6" class="r" style="font-weight:700;font-size:13px;">최 종 금 액</td><td class="r" style="font-weight:700;font-size:13px;">₩${fmt(r.finalPrice)}</td><td style="font-size:8px;color:#666;">만원 단위 절사, 부가세 별도<br>카드결제 별도</td></tr>`;
  
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;width:800px;background:#fff;padding:30px 35px;font-family:"Noto Sans KR",sans-serif;color:#000;font-size:10px;';
  container.innerHTML = `
    <style>
      .pdf-wrap, .pdf-wrap * { font-family: "Noto Sans KR", sans-serif !important; margin:0; padding:0; box-sizing:border-box; }
      .pdf-wrap table { border-collapse:collapse; }
      .pdf-wrap .r { text-align:right; }
      .pdf-wrap .c { text-align:center; }
      .pdf-wrap .l { text-align:left; }
      .pdf-wrap .rem { font-size:8px; color:#555; }
      .main-tbl { width:100%; font-size:9px; }
      .main-tbl th { background:#f5f5f5; border:1px solid #ccc; padding:4px 5px; font-weight:600; text-align:center; }
      .main-tbl td { border:1px solid #ddd; padding:3px 5px; }
      .main-tbl .sub td { background:#fafafa; border-top:2px solid #999; }
      .main-tbl .ind td { color:#444; }
      .main-tbl .total-row td { border-top:2px solid #333; background:#f0f0f0; }
      .main-tbl .final-row td { background:#333; color:#fff; border:1px solid #333; }
      .main-tbl .final-row .r { color:#fff; }
    </style>
    <div class="pdf-wrap">
      <!-- Logo -->
      <div style="margin-bottom:10px;">
        <img src="${LOGO_B64}" style="height:38px;" crossorigin="anonymous">
      </div>
      <hr style="border:none;border-top:1px solid #000;margin:8px 0;">
      <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;">
        <span>상담 문의 : 박가영 (010-5064-4150)</span>
        <span style="font-weight:600;">(주)바로스</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:8px;">
        <span></span><span>${r.customerName} 고객님</span>
      </div>
      <div style="font-size:9px;margin-bottom:8px;color:#333;">
        레터스 무브 전문가가 ${workDateStr || quoteDateStr}에 '사전 현장 체크리스트'를 바탕으로 산출한 견적입니다.
      </div>
      <hr style="border:none;border-top:1px solid #ccc;margin:6px 0 10px;">
      <table class="main-tbl">
        <thead><tr>
          <th style="width:4%;">구분</th><th style="width:8%;"></th><th style="width:22%;">세부품목</th>
          <th style="width:7%;">수량</th><th style="width:5%;">단위</th><th style="width:13%;">단가</th>
          <th style="width:14%;">합계</th><th style="width:27%;">특이사항</th>
        </tr></thead>
        <tbody>${itemsHtml}</tbody>
      </table>
      <div style="margin-top:12px;border:1px solid #ccc;padding:8px;min-height:30px;">
        <div style="font-size:9px;font-weight:600;margin-bottom:4px;">비고</div>
      </div>
      <table style="width:100%;margin-top:10px;font-size:9px;border-collapse:collapse;">
        <tr><td style="width:10%;border:1px solid #aaa;padding:4px 8px;background:#f5f5f5;font-weight:600;">출발지</td><td style="border:1px solid #aaa;padding:4px 8px;">${coopData.departure || ''}</td></tr>
        <tr><td style="border:1px solid #aaa;padding:4px 8px;background:#f5f5f5;font-weight:600;">도착지</td><td style="border:1px solid #aaa;padding:4px 8px;">${coopData.arrival || ''}</td></tr>
      </table>
    </div>
  `;
  document.body.appendChild(container);
  
  // Wait for Noto Sans KR font to fully load
  if (document.fonts && document.fonts.ready) {
    await document.fonts.ready;
  }
  await new Promise(r => setTimeout(r, 800));
  
  const canvas = await html2canvas(container, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
  document.body.removeChild(container);
  
  const { jsPDF } = window.jspdf;
  const imgWidth = 210;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;
  const pageHeight = 297;
  const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
  
  if (imgHeight > pageHeight) {
    const scale = pageHeight / imgHeight;
    doc.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, imgWidth * scale + (imgWidth * (1-scale))/2, pageHeight);
  } else {
    doc.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, imgWidth, imgHeight);
  }
  
  return doc.output('blob');
}

function getPDFFileName() {
  const r = letusResult;
  const today = new Date();
  const ds = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  return `레터스_${r.customerName} 기업이사 서비스 견적_${ds}.pdf`;
}

async function sendEmailWithPDF() {
  showLoading('PDF 생성 및 이메일 준비 중...');
  
  try {
    const r = letusResult;
    const pdfBlob = await generatePDFBlob();
    const fileName = getPDFFileName();
    
    // 1. HTML 메일 본문을 클립보드에 복사
    const htmlBody = getEmailBodyHTML(r.customerName);
    const plainBody = getEmailBodyText(r.customerName);
    
    try {
      const htmlBlob = new Blob([htmlBody], { type: 'text/html' });
      const textBlob = new Blob([plainBody], { type: 'text/plain' });
      await navigator.clipboard.write([
        new ClipboardItem({
          'text/html': htmlBlob,
          'text/plain': textBlob,
        })
      ]);
    } catch(clipErr) {
      try { await navigator.clipboard.writeText(plainBody); } catch(e2) {}
    }
    
    // 2. PDF blob을 임시 저장 (나중에 다운로드)
    window._pendingPDF = { blob: pdfBlob, name: fileName };
    
    hideLoading();
    
    // 3. mailto 먼저 열기 (Outlook 팝업)
    const toEmail = (r.customerEmail || '').trim();
    const subject = `[레터스] ${r.customerName} 기업이사 견적서 전달의 건`;
    window.location.href = `mailto:${toEmail}?subject=${encodeURIComponent(subject)}`;
    
    showToast('📋 메일 본문이 복사되었습니다.<br>Outlook에서 붙여넣기 해주세요!', 5000);
    
  } catch(e) {
    hideLoading();
    alert('오류: ' + e.message);
    console.error(e);
  }
}

// 페이지로 돌아왔을 때 PDF 자동 다운로드
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && window._pendingPDF) {
    const { blob, name } = window._pendingPDF;
    window._pendingPDF = null;
    setTimeout(() => {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = name;
      link.click();
      URL.revokeObjectURL(link.href);
      showToast('📥 PDF 다운로드 완료', 3000);
    }, 500);
  }
});
</script>
